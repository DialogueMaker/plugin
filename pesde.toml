name = "dialoguemaker/plugin"
version = "5.0.0-rc.2"
description = "A helpful user interface to create dialogue in games."
authors = ["Christian Toney <christian.toney@beastslash.com>"]
repository = "https://github.com/DialogueMaker/plugin"
license = "MPL-2.0"
includes = [
  "pesde.toml",
  "README.md",
  "LICENSE",
  "src/**/*.luau",
]
workspace_members = ["src/DialogueMakerKit"]
private = true

[target]
environment = "roblox"
lib = "src/init.luau"
build_files = ["src"]

[engines]
pesde = "^0.7.0-rc.6"
lune = "^0.8.9"

[indices]
default = "https://github.com/pesde-pkg/index"

[wally_indices]
default = "https://github.com/UpliftGames/wally-index"

[scripts]
roblox_sync_config_generator = ".pesde/scripts/roblox_sync_config_generator.luau"
sourcemap_generator = ".pesde/scripts/sourcemap_generator.luau"

[dev_dependencies]
scripts = { name = "pesde/scripts_rojo", version = "^0.1.0", target = "lune" }
rojo = { name = "pesde/rojo", version = "^7.5.1", target = "lune" }
luau_lsp = { name = "pesde/luau_lsp", version = "^1.48.0", target = "lune" }
ijw = { name = "beastslash/ijw", version = "^2.0.0" }

[dependencies]
react = { wally = "jsdotlua/react", version = "^17.2.1" }
react-roblox = { wally = "jsdotlua/react-roblox", version = "^17.2.1" }
ReactErrorBoundary = { wally = "chriscerie/react-error-boundary", version = "^0.2.0" }
